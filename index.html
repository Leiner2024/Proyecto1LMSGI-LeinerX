<!DOCTYPE html>
<html lang="ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Guesas by Leiner</title>
</head>
<body>
    <header>
        <div class="header-content container-main">
            <div class="logo">
                <a href="index.html"><img src="Recursos/LogoGuesas.png" alt="Logo de Guesas"></a>
            </div>
            <div class="menu">
                <label class="menu-btn">
                    <input type="checkbox" >
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </label>
            </div>
        </div>
    </header>

    <div class="Portada">

        <h1>Empapa</h1>
        <img src="Recursos/Guesas/ExtremeColesterol.png" alt="ExtremeColesterol" class="portada-img">
        <h1 style="z-index: 3; color: transparent; -webkit-text-stroke: 4px #6c151a; pointer-events: none;">Empapa</h1>
        
    </div>

    <section class="comidas container-main">
        <h2 class="categoria-titulo">Vacuno</h2>
        <div class="grid-comidas">
    
            <div class="comida-item">
                <img src="Recursos/Guesas/CheeseBacon.png" alt="Junior"> 
                <h3>Junior</h3>
            </div>
            <div class="comida-item">
                <img src="Recursos/Guesas/ExtremeColesterol.png" alt="Extreme"> 
                <h3>Extreme</h3>
            </div>
            <div class="comida-item">
                <img src="Recursos/Guesas/LaGolosa.png" alt="Veggi"> 
                <h3>Veggi</h3>
            </div>
             <div class="comida-item">
                <img src="Recursos/Guesas/DoubleFloor.png" alt="Extras"> 
                <h3>Extras</h3>
            </div>
        </div>
        
        <h2 class="categoria-titulo" style="margin-top: 4rem;">Pollo</h2>
         <div class="grid-comidas">
            <div class="comida-item">
                <img src="Recursos/Guesas/PolloKrok.png" alt="Krok">
                <h3>Krok</h3>
            </div>
             <div class="comida-item">
                <img src="Recursos/Guesas/Complementos.png" alt="Extras Pollo">
                <h3>Extras</h3>
            </div>
            
         </div>
    </section>
</body>
</html>
