<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/index copy.css">
    <title>Guesas by Leiner</title>
</head>
<body>
    <header>
        <div class="header-content container-main">
            <div class="logo">
                <img src="Recursos/LogoGuesas.png" alt="Logo de Guesas">
            </div>
            <div class="menu">
                <label class="menu-btn">
                    <input type="checkbox" >
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </label>
            </div>
        </div>
    </header>

    <div class="Portada">
        <h1>Empapa</h1>
        <img src="Recursos/Guesas/ExtremeColesterol.png" alt="ExtremeColesterol" class="portada-img">
    </div>

    <section class="comidas container-main">
        <h2 class="categoria-titulo">Vacuno</h2>
        <div class="grid-comidas">
    
            <div class="comida-item">
                <img src="Recursos/Guesas/CheeseBacon.png" alt="Junior"> 
                <h3>Junior</h3>
            </div>
            <div class="comida-item">
                <img src="Recursos/Guesas/ExtremeColesterol.png" alt="Extreme"> 
                <h3>Extreme</h3>
            </div>
            <div class="comida-item">
                <img src="Recursos/Guesas/LaGolosa.png" alt="Veggi"> 
                <h3>Veggi</h3>
            </div>
             <div class="comida-item">
                <img src="Recursos/Guesas/DoubleFloor.png" alt="Extras"> 
                <h3>Extras</h3>
            </div>
        </div>

        
        <h2 class="categoria-titulo" style="margin-top: 4rem;">Pollo</h2>
         <div class="grid-comidas">
            <div class="comida-item">
                <img src="https://placehold.co/300x200/f8f8f8/6c151a?text=Pollo+Kroso" alt="Kroso">
                <h3>Kroso</h3>
            </div>
             <div class="comida-item">
                <img src="https://placehold.co/300x200/f8f8f8/6c151a?text=Pollo+Extras" alt="Extras Pollo">
                <h3>Extras</h3>
            </div>
            
         </div>
    </section>
</body>
</html>
