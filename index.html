<!DOCTYPE html>
<html lang="ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Guesas by Leiner</title>
</head>
<body>
    <header>
        <div class="header-content container-main">
            <div class="logo">
                <a href="index.html"><img src="Recursos/LogoGuesas.png" alt="Logo de Guesas"></a>
            </div>
            <div class="menu">
                <label class="menu-btn" id="menu-toggle">
                    <input type="checkbox" >
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </label>
            </div>
        </div>
    </header>

    <div class="Portada">
        <h1>Empapa</h1>
        <img src="Recursos/Guesas/Extreme/ExtremeColesterol.png" alt="ExtremeColesterol" class="portada-img">
        <h1 style="z-index: 3; color: transparent; -webkit-text-stroke: 4px #6c151a; pointer-events: none;">Empapa</h1>
    </div>

    <section class="comidas container-main">
        <h2 class="categoria-titulo">Vacuno</h2>
        <div class="grid-comidas">
    
            <div class="comida-item" data-categoria="junior" style="cursor: pointer;">
                <img src="Recursos/Guesas/Junior/CheeseBacon.png" alt="Junior"> 
                <h3>Junior</h3>
            </div>
            <div class="comida-item" data-categoria="extreme" style="cursor: pointer;">
                <img src="Recursos/Guesas/Extreme/ExtremeColesterol.png" alt="Extreme"> 
                <h3>Extreme</h3>
            </div>
            <div class="comida-item" data-categoria="veggi" style="cursor: pointer;">
                <img src="Recursos/Guesas/Junior/LaGolosa.png" alt="Veggi"> 
                <h3>Veggi</h3>
            </div>
             <div class="comida-item" data-categoria="extras_vacuno" style="cursor: pointer;">
                <img src="Recursos/Guesas/Complementos/Chicken-Fingers-Eggs.png" alt="Complementos morbidos"> 
                <h3>Complementos morbidos</h3>
            </div>
        </div>
        
        <h2 class="categoria-titulo" style="margin-top: 4rem;">Pollo</h2>
         <div class="grid-comidas">
            <div class="comida-item" data-categoria="krok" style="cursor: pointer;">
                <img src="Recursos/Guesas/Krok/PolloKrok.png" alt="Krok">
                <h3>Krok</h3>
            </div>
             <div class="comida-item" data-categoria="extras_pollo" style="cursor: pointer;">
                <img src="Recursos/Guesas/Complementos/FatWitch.png" alt="Postres">
                <h3>Postres</h3>
            </div>
         </div>
    </section>

    <footer>
        <div class="footer-top">
            <div class="side lado-left">
                <div class="ubi-img">
                    <a href="https://maps.app.goo.gl/s28X8TeJsLqQGthNA" target="_blank"><img src="Recursos/mapGuesas.jpg" alt="Ubicacion de Guesas"></a>
                </div>
            </div>

            <div class="side lado-right">
                <div class="legal">
                    <a href="#"><p>Terminos y Condiciones</p></a>
                    <a href="#"><p>Politica de Privacidad</p></a>
                    <a href="#"><p>Contacto</p></a>
                    <a href="#"><p>Aviso Legal</p></a>
                </div>
            </div>
        </div>

        <div class="line-copy"></div>
            
        <img src="Recursos/LogoGuesas.png" alt="Logo" class="logo-mini"><p>Copyright 2025 Guesas España</p>

    </footer>

    <div class="menu-overlay" id="menu-overlay">
        <nav class="menu-nav">
            <ul>
                <li><a href="#">Carta</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">MyGuesas</a></li>
                <li><a href="#">Restaurantes</a></li>
            </ul>
        </nav>
    </div>

    <!-- Categories Overlays -->
    <div class="modal-overlay" id="modal-menu">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h2 id="modal-title" class="categoria-titulo" style="font-size: 50px; margin-bottom: 10px;">Categoria</h2>
            <div id="modal-grid" class="modal-grid">
            </div>
        </div>
    </div>

    <script src="js/global.js"></script>
</body>
</html>
